<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 128">
  <!-- Rebooting: closed-line eyes, normal ball (the 1Hz blink is animation-
       only), cycling status dots fading out beside the head. -->
  <circle cx="80" cy="13.5" r="13" fill="#ffaa3c" opacity="0.22"/>
  <circle cx="80" cy="13.5" r="8.5" fill="#ffaa3c"/>
  <rect x="76.5" y="20" width="7" height="24" rx="3" fill="#555555"/>
  <rect x="28" y="46.5" width="104" height="73" rx="17.5" fill="#ffffff" stroke="#555555" stroke-width="5"/>
  <!-- closed eyes: flat lines -->
  <path d="M 53 83 L 70 83" fill="none" stroke="#ffaa3c" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 90 83 L 107 83" fill="none" stroke="#ffaa3c" stroke-width="5.5" stroke-linecap="round"/>
  <!-- cycling dots, fading -->
  <circle cx="146" cy="70" r="4.5" fill="#ffaa3c"/>
  <circle cx="160" cy="70" r="4.5" fill="#ffaa3c" opacity="0.66"/>
  <circle cx="174" cy="70" r="4.5" fill="#ffc46e" opacity="0.4"/>
</svg>
